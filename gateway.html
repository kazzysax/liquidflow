<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Flow — Gateway</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<script src="theme-toggle.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --flow:#1E5BFF; --flow-2:#5B8DFF; --ink:#0A1B3D; --ink-2:#5B6B8C;
    --mist:#D7E7F9; --cloud:#F6F8FC; --line:#E5EAF2; --line-2:#EEF1F6;
    --white:#fff; --green:#1D9E75; --green-bg:#E1F5EE; --green-tx:#0F6E56;
    --r-sm:10px; --r-md:14px; --r-lg:18px;
    --display:'Space Grotesk',sans-serif; --body:'Inter',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--body);color:var(--ink);background:var(--cloud);line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
  a{text-decoration:none;color:inherit}

  /* top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:15px 28px;background:var(--white);border-bottom:1px solid var(--line-2);position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:center;gap:11px}
  .brand .wm{font-family:var(--display);font-size:18px;font-weight:600;letter-spacing:-.4px;color:var(--ink)}
  .brand .wm span{color:var(--flow);font-weight:500}
  .gateway-pill{font-size:12.5px;color:var(--green-tx);background:var(--green-bg);padding:6px 14px;border-radius:100px;display:flex;align-items:center;gap:8px;font-weight:500}
  .gateway-pill .lt{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(29,158,117,.4);animation:pulse 2.2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(29,158,117,.35)}70%{box-shadow:0 0 0 7px rgba(29,158,117,0)}100%{box-shadow:0 0 0 0 rgba(29,158,117,0)}}

  /* page */
  .page{max-width:840px;margin:0 auto;padding:40px 24px 60px}
  .page-head{margin-bottom:26px}
  .page-head h1{font-family:var(--display);font-size:26px;font-weight:600;letter-spacing:-.8px;color:var(--ink)}
  .page-head p{font-size:14.5px;color:var(--ink-2);margin-top:5px}

  /* system bars */
  .systems{display:flex;flex-direction:column;gap:14px}
  .sysbar{display:flex;align-items:center;gap:18px;padding:20px 22px;background:var(--white);border:1px solid var(--line);border-radius:var(--r-md);cursor:pointer;transition:border-color .22s,box-shadow .22s,transform .22s;text-align:left;width:100%;font-family:var(--body)}
  .sysbar:hover{border-color:var(--flow);box-shadow:0 14px 34px -22px rgba(30,91,255,.4);transform:translateY(-2px)}
  .sysbar .ic{width:50px;height:50px;border-radius:14px;background:#E6F1FB;display:flex;align-items:center;justify-content:center;color:var(--flow);font-size:24px;flex-shrink:0;transition:background .22s,color .22s}
  .sysbar:hover .ic{background:var(--flow);color:#fff}
  .sysbar .mid{flex:1;min-width:0;display:flex;flex-direction:column}
  .sysbar .mid .nm{display:block;font-family:var(--display);font-size:17px;font-weight:600;color:var(--ink)}
  .sysbar .mid .ds{display:block;font-size:13.5px;color:var(--ink-2);margin-top:3px}
  .sysbar .stat{text-align:right;flex-shrink:0;margin-right:18px;display:flex;flex-direction:column}
  .sysbar .stat .v{font-family:var(--display);font-size:16px;font-weight:600;color:var(--ink)}
  .sysbar .stat .k{font-size:11.5px;color:var(--ink-2);margin-top:1px}
  .sysbar .chev{color:#9AA7BF;font-size:21px;flex-shrink:0;transition:color .22s,transform .22s}
  .sysbar:hover .chev{color:var(--flow);transform:translateX(3px)}

  .foot-note{margin-top:34px;text-align:center;font-size:12px;color:var(--ink-2);opacity:.85;line-height:1.55;max-width:560px;margin-left:auto;margin-right:auto}

  @media(max-width:600px){
    .topbar{padding:13px 18px}
    .page{padding:30px 16px 50px}
    .sysbar{gap:14px;padding:17px 16px}
    .sysbar .ic{width:44px;height:44px;font-size:21px}
    .sysbar .mid .nm{font-size:15.5px}
    .sysbar .mid .ds{font-size:12.5px}
    .sysbar .stat{display:none}
  }
</style>
</head>
<body>

  <div class="topbar">
    <a href="index.html" class="brand">
      <svg width="28" height="28" viewBox="0 0 56 56" aria-label="Liquid Flow"><circle cx="28" cy="28" r="22" fill="none" stroke="#D7E7F9" stroke-width="3.5"/><path d="M5 28 a23 23 0 0 1 46 0" fill="none" stroke="#1E5BFF" stroke-width="3.5" stroke-linecap="round"/><path d="M28 15 C33 23,37 28,37 33 a9 9 0 0 1 -18 0 C19 28,23 23,28 15 Z" fill="#1E5BFF"/></svg>
      <span class="wm">Liquid<span>Flow</span></span>
    </a>
    <div style="display:flex;align-items:center;gap:14px">
      <a href="docs.html" style="font-size:13px;color:var(--ink-2);font-weight:500">Docs</a>
      <a href="campaigns.html" style="font-size:13px;color:var(--ink-2);font-weight:500">Browse campaigns</a>
      <span class="gateway-pill"><span class="lt"></span>Gateway</span>
    </div>
  </div>

  <div class="page">
    <div class="page-head">
      <h1>Choose a system</h1>
    </div>

    <div class="systems">

      <button class="sysbar" onclick="enter('integrate-payment')">
        <span class="ic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M14 7l3-3M20 4l-3 3M9 10l5 5M7 14l-2 2a3 3 0 0 0 4 4l2-2M14 11l2-2a3 3 0 0 1 4 4l-2 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        <span class="mid">
          <span class="nm">Integrate Payment System</span>
          <span class="ds">Connect a gated wallet and define how funds may move.</span>
        </span>
        <svg class="chev" width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>

      <button class="sysbar" onclick="enter('potlock')">
        <span class="ic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><ellipse cx="12" cy="7" rx="7" ry="3" stroke="currentColor" stroke-width="1.8"/><path d="M5 7v5c0 1.7 3.1 3 7 3s7-1.3 7-3V7" stroke="currentColor" stroke-width="1.8"/><path d="M5 12v5c0 1.7 3.1 3 7 3s7-1.3 7-3v-5" stroke="currentColor" stroke-width="1.8"/></svg></span>
        <span class="mid">
          <span class="nm">Potlock System</span>
          <span class="ds">Open, publicly visible fundraising pools anyone can join.</span>
        </span>
        <svg class="chev" width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>

      <button class="sysbar" onclick="enter('payroll')">
        <span class="ic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="13" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M3 10h18" stroke="currentColor" stroke-width="1.8"/><path d="M7 15h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="17" cy="15" r="1.3" fill="currentColor"/></svg></span>
        <span class="mid">
          <span class="nm">Payroll System</span>
          <span class="ds">Automate scheduled crypto payouts — you fund and own the contract, we only trigger.</span>
        </span>
        <svg class="chev" width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>

    </div>

  </div>

<script>
  function enter(sys){
    var routes = {
      'integrate-payment': 'integrate-setup.html',
      'potlock': 'potlock-create.html',
      'payroll': 'payroll.html'
    };
    var dest = routes[sys];
    if(dest && dest !== '#'){ window.location.href = dest; }
  }
</script>
</body>
</html>
