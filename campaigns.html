<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Flow — Browse campaigns</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<script src="theme-toggle.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --flow:#1E5BFF; --flow-2:#5B8DFF; --ink:#0A1B3D; --ink-2:#5B6B8C;
    --mist:#D7E7F9; --cloud:#F6F8FC; --line:#E5EAF2; --line-2:#EEF1F6; --white:#fff;
    --ok:#1D9E75; --ok-bg:#E1F5EE; --ok-tx:#0F6E56;
    --display:'Space Grotesk',sans-serif; --body:'Inter',sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--body);color:var(--ink);background:var(--cloud);line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
  a{color:inherit;text-decoration:none}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:var(--white);border-bottom:1px solid var(--line-2);position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:center;gap:10px}
  .brand .wm{font-family:var(--display);font-size:17px;font-weight:600;letter-spacing:-.4px}
  .brand .wm span{color:var(--flow);font-weight:500}
  .btn{font-family:var(--display);font-weight:500;font-size:13px;padding:9px 15px;border-radius:10px;border:none;cursor:pointer;background:var(--flow);color:#fff}
  .wrap{max-width:980px;margin:0 auto;padding:34px 24px 70px}
  .head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:24px}
  .head h1{font-family:var(--display);font-size:27px;font-weight:600;letter-spacing:-.8px}
  .head p{font-size:14px;color:var(--ink-2);margin-top:4px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
  .card{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:20px;transition:transform .2s,box-shadow .2s,border-color .2s;display:block}
  .card:hover{transform:translateY(-3px);box-shadow:0 18px 40px -22px rgba(10,27,61,.4);border-color:var(--flow)}
  .card .t{font-family:var(--display);font-size:16px;font-weight:600;letter-spacing:-.3px;margin-bottom:6px}
  .card .d{font-size:13px;color:var(--ink-2);min-height:38px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .raised{display:flex;align-items:baseline;gap:6px;margin-top:14px}
  .raised .v{font-family:var(--display);font-size:20px;font-weight:600}
  .raised .u{font-size:12px;color:var(--ink-2)}
  .bar{height:7px;background:var(--line-2);border-radius:100px;margin-top:9px;overflow:hidden}
  .bar .f{height:100%;background:linear-gradient(90deg,var(--flow),var(--flow-2));border-radius:100px}
  .meta{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-2);margin-top:9px}
  .empty{text-align:center;color:var(--ink-2);padding:50px 0}
  .empty .btn{margin-top:16px;display:inline-block}
</style>
</head>
<body>
  <div class="topbar">
    <a href="index.html" class="brand">
      <svg width="26" height="26" viewBox="0 0 56 56"><circle cx="28" cy="28" r="22" fill="none" stroke="#D7E7F9" stroke-width="3.5"/><path d="M5 28 a23 23 0 0 1 46 0" fill="none" stroke="#1E5BFF" stroke-width="3.5" stroke-linecap="round"/><path d="M28 15 C33 23,37 28,37 33 a9 9 0 0 1 -18 0 C19 28,23 23,28 15 Z" fill="#1E5BFF"/></svg>
      <span class="wm">Liquid<span>Flow</span></span>
    </a>
    <a href="potlock-create.html" class="btn">Start a fundraiser</a>
  </div>

  <div class="wrap">
    <div class="head">
      <div>
        <h1>Browse campaigns</h1>
        <p>Public Potlock fundraisers. Totals are computed live from confirmed on-chain donations.</p>
      </div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">
      <div>No campaigns yet.</div>
      <a href="potlock-create.html" class="btn">Create the first one →</a>
    </div>
  </div>

<script>
  function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  async function load(){
    try{
      const r=await fetch('/api/fundraisers'); const d=await r.json();
      const list=d.fundraisers||[];
      const grid=document.getElementById('grid');
      if(!list.length){ document.getElementById('empty').style.display='block'; return; }
      grid.innerHTML=list.map(f=>(
        '<a class="card" href="potlock-fundraiser.html?id='+f.id+'">'
        +'<div class="t">'+esc(f.title)+'</div>'
        +'<div class="d">'+esc(f.description||'')+'</div>'
        +'<div class="raised"><span class="v">'+f.raised+'</span><span class="u">/ '+f.goal+' test ETH</span></div>'
        +'<div class="bar"><div class="f" style="width:'+f.pct+'%"></div></div>'
        +'<div class="meta"><span>'+f.pct+'% funded</span><span>'+f.donation_count+' donations</span></div>'
        +'</a>'
      )).join('');
    }catch(e){ document.getElementById('empty').style.display='block'; }
  }
  load();
</script>
</body>
</html>
