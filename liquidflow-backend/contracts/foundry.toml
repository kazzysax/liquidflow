[profile.default]
src = "src"
test = "test-foundry"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
fs_permissions = [{ access = "read", path = "./" }]

# Forked-mainnet tests read this. Public Base RPC works for recent state.
[rpc_endpoints]
base = "${BASE_MAINNET_RPC}"
base_sepolia = "${BASE_SEPOLIA_RPC}"

[fuzz]
runs = 256
